name: Automated Cloud ETL Pipeline

on:
  schedule:
    # This CRON syntax means "Run at 00:00 (Midnight) UTC every single day"
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to click a button on GitHub to run it manually

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Provision Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install requests pandas

      - name: Execute Extraction Pipeline
        run: python pipeline.py

      - name: Commit Database to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tech_news.db daily_report.csv
          git commit -m "🤖 Auto-Update: ETL Pipeline executed" || echo "No new data to commit"
          git push
