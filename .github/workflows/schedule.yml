name: Automated Cloud ETL Pipeline

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # 🔑 THE FIX: Grant the bot permission to push files back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # ⬆️ Upgraded to v4 to fix the Node warning

      - name: Provision Python Environment
        uses: actions/setup-python@v5 # ⬆️ Upgraded to v5 to fix the Node warning
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install requests pandas

      - name: Execute Extraction Pipeline
        run: python main.py

      - name: Commit Database to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tech_news.db daily_report.csv
          git commit -m "🤖 Auto-Update: ETL Pipeline executed" || echo "No new data to commit"
          git push
