<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" width="1200" height="340">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="55%" style="stop-color:#071528"/>
      <stop offset="100%" style="stop-color:#040c18"/>
    </linearGradient>

    <!-- Teal glow gradient for nodes -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00e5c0;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00e5c0;stop-opacity:0"/>
    </radialGradient>

    <!-- Horizontal scan line sweep -->
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5c0;stop-opacity:0"/>
      <stop offset="45%" style="stop-color:#00e5c0;stop-opacity:0.5"/>
      <stop offset="55%" style="stop-color:#00e5c0;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00e5c0;stop-opacity:0"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0e2a45" stroke-width="0.5"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#0d2038"/>
    </pattern>

    <!-- Orange accent gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#f7b733"/>
    </linearGradient>

    <!-- Teal line gradient -->
    <linearGradient id="tealLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5c0;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0077ff;stop-opacity:0.5"/>
    </linearGradient>

    <!-- Node box glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for icons -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="mainClip">
      <rect width="1200" height="340"/>
    </clipPath>
  </defs>

  <g clip-path="url(#mainClip)">
    <!-- Base background -->
    <rect width="1200" height="340" fill="url(#bgGrad)"/>
    <rect width="1200" height="340" fill="url(#dots)" opacity="0.8"/>
    <rect width="1200" height="340" fill="url(#grid)" opacity="0.4"/>

    <!-- Ambient blobs -->
    <ellipse cx="160" cy="170" rx="220" ry="180" fill="#003355" opacity="0.18"/>
    <ellipse cx="1060" cy="200" rx="200" ry="160" fill="#002244" opacity="0.22"/>
    <ellipse cx="600" cy="60" rx="350" ry="120" fill="#001a33" opacity="0.15"/>

    <!-- Top accent bar -->
    <rect x="0" y="0" width="1200" height="2" fill="url(#orangeGrad)" opacity="0.9"/>
    <!-- Bottom accent bar -->
    <rect x="0" y="338" width="1200" height="2" fill="url(#tealLine)" opacity="0.6"/>

    <!-- ===== PIPELINE NODES — right side ===== -->
    <!-- Connector vertical line -->
    <line x1="890" y1="60" x2="890" y2="290" stroke="#0d3a5c" stroke-width="1.5" stroke-dasharray="4 4"/>

    <!-- Node 1: API -->
    <rect x="855" y="52" width="70" height="30" rx="5" fill="#061e35" stroke="#00e5c0" stroke-width="1" filter="url(#glow)"/>
    <text x="890" y="72" text-anchor="middle" font-family="monospace" font-size="9" fill="#00e5c0">REST API</text>
    <circle cx="890" cy="67" r="20" fill="url(#nodeGlow)" opacity="0.5"/>

    <!-- Arrow 1→2 -->
    <line x1="890" y1="82" x2="890" y2="110" stroke="#00e5c0" stroke-width="1.2" opacity="0.5"/>
    <polygon points="890,115 886,108 894,108" fill="#00e5c0" opacity="0.6"/>
    <text x="900" y="100" font-family="monospace" font-size="7.5" fill="#4a9ebe" opacity="0.8">EXTRACT</text>

    <!-- Node 2: Python -->
    <rect x="851" y="115" width="78" height="30" rx="5" fill="#061e35" stroke="#0077ff" stroke-width="1" filter="url(#glow)"/>
    <text x="890" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#0099ff">PYTHON 3.10</text>

    <!-- Arrow 2→3 -->
    <line x1="890" y1="145" x2="890" y2="163" stroke="#0077ff" stroke-width="1.2" opacity="0.5"/>
    <polygon points="890,168 886,161 894,161" fill="#0077ff" opacity="0.6"/>
    <text x="900" y="158" font-family="monospace" font-size="7.5" fill="#4a9ebe" opacity="0.8">TRANSFORM</text>

    <!-- Node 3: Normalise -->
    <rect x="844" y="168" width="92" height="30" rx="5" fill="#061e35" stroke="#7c3aed" stroke-width="1" filter="url(#glow)"/>
    <text x="890" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">NORMALISE</text>

    <!-- Arrow 3→4 -->
    <line x1="890" y1="198" x2="890" y2="216" stroke="#7c3aed" stroke-width="1.2" opacity="0.5"/>
    <polygon points="890,221 886,214 894,214" fill="#7c3aed" opacity="0.6"/>
    <text x="900" y="212" font-family="monospace" font-size="7.5" fill="#4a9ebe" opacity="0.8">LOAD</text>

    <!-- Node 4: SQLite -->
    <rect x="852" y="221" width="76" height="30" rx="5" fill="#061e35" stroke="#f7b733" stroke-width="1" filter="url(#glow)"/>
    <text x="890" y="241" text-anchor="middle" font-family="monospace" font-size="9" fill="#f7b733">SQLITE DB</text>

    <!-- Arrow 4→5 -->
    <line x1="890" y1="251" x2="890" y2="269" stroke="#f7b733" stroke-width="1.2" opacity="0.5"/>
    <polygon points="890,274 886,267 894,267" fill="#f7b733" opacity="0.6"/>
    <text x="900" y="265" font-family="monospace" font-size="7.5" fill="#4a9ebe" opacity="0.8">EXPORT</text>

    <!-- Node 5: CSV -->
    <rect x="857" y="274" width="66" height="30" rx="5" fill="#061e35" stroke="#ff6b35" stroke-width="1" filter="url(#glow)"/>
    <text x="890" y="294" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff8c5a">CSV REPORT</text>

    <!-- Decorative side elements -->
    <!-- Left vertical bar -->
    <rect x="58" y="40" width="2" height="260" fill="url(#tealLine)" opacity="0.35"/>
    <!-- Right vertical bar -->
    <rect x="990" y="40" width="2" height="260" fill="url(#tealLine)" opacity="0.25"/>

    <!-- GitHub Actions badge top-right -->
    <rect x="1010" y="28" width="150" height="22" rx="4" fill="#0d1f35" stroke="#0077ff" stroke-width="0.8" opacity="0.85"/>
    <text x="1085" y="43" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#4499dd">⚡ GitHub Actions</text>

    <!-- CRON badge -->
    <rect x="1010" y="58" width="150" height="22" rx="4" fill="#0d1f35" stroke="#00e5c0" stroke-width="0.8" opacity="0.85"/>
    <text x="1085" y="73" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#00c9a7">⏰ CRON 0 0 * * *</text>

    <!-- Free runner badge -->
    <rect x="1010" y="88" width="150" height="22" rx="4" fill="#0d1f35" stroke="#f7b733" stroke-width="0.8" opacity="0.85"/>
    <text x="1085" y="103" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#f7b733">💰 $0.00 / run</text>

    <!-- Scan line effect -->
    <rect x="0" y="158" width="1200" height="2" fill="url(#scanLine)" opacity="0.12"/>

    <!-- ===== MAIN TEXT ===== -->
    <!-- Eyebrow label -->
    <text x="90" y="108" font-family="'Courier New', monospace" font-size="11" fill="#00e5c0" letter-spacing="5" opacity="0.75">AUTOMATED  ·  CLOUD-NATIVE  ·  ZERO-COST</text>

    <!-- Main title -->
    <text x="88" y="182" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" fill="#e8f4ff" letter-spacing="-1" filter="url(#textGlow)" opacity="0.97">Cloud ETL</text>
    <text x="88" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700" letter-spacing="-1" opacity="0.97">
      <tspan fill="url(#orangeGrad)" filter="url(#textGlow)">Pipeline</tspan>
    </text>

    <!-- Subtitle -->
    <text x="90" y="286" font-family="'Courier New', monospace" font-size="13.5" fill="#7aafc8" letter-spacing="0.5">Extract  →  Transform  →  Load  →  Report</text>

    <!-- Decorative corner marks -->
    <path d="M 30 30 L 50 30 L 50 50" fill="none" stroke="#00e5c0" stroke-width="1.5" opacity="0.5"/>
    <path d="M 30 310 L 50 310 L 50 290" fill="none" stroke="#00e5c0" stroke-width="1.5" opacity="0.5"/>
    <path d="M 1170 30 L 1150 30 L 1150 50" fill="none" stroke="#00e5c0" stroke-width="1.5" opacity="0.5"/>
    <path d="M 1170 310 L 1150 310 L 1150 290" fill="none" stroke="#00e5c0" stroke-width="1.5" opacity="0.5"/>

    <!-- Horizontal rule under eyebrow -->
    <line x1="88" y1="116" x2="820" y2="116" stroke="#0e2a45" stroke-width="1"/>

    <!-- Author credit -->
    <text x="90" y="318" font-family="'Courier New', monospace" font-size="10" fill="#2a5a7a" letter-spacing="2">Muhammad Shakeel</text>
  </g>
</svg>
